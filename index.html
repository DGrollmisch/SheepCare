    // ── Meadow Screen (Phase-2-Platzhalter) ─────────────────────────────────
    // Seeded RNG (deterministische Schaf-/Deko-Platzierung)
    const mulberry32 = (a) => () => {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
    const WORLD_W = 1600, WORLD_H = 1100;
    const BARN = { x: 250, y: 230 };           // Stall-Position (Welt)
    const BARN_DOOR = { x: 250, y: 300 };
    const TROUGH = { x: 430, y: 250, w: 90, h: 34 };

    const MeadowScreen = ({ streak, game, todayDone, onPersistGame, onBack }) => {
      const visible = Math.min(streak.current, 50);
      const inStallCount = Math.max(0, streak.current - 50);
      const today = dateKey();
      const doneToday = game && game.gameDoneDate === today;
      const woolStageFor = (i) => {
        const shorn = game && game.shorn && game.shorn[i];
        const age = shorn ? daysBetween(today, shorn) : (streak.current - 1 - i);
        return Math.max(0, Math.min(6, age));
      };

      const canvasRef = useRef(null);
      const wrapRef   = useRef(null);
      const engineRef = useRef(null);
      const toolRef   = useRef('none');

      const [tool, setTool]   = useState('none');       // 'none' | 'shear'
      const [night, setNight] = useState(doneToday);
      const [waterOk, setWaterOk] = useState(game && game.waterDate === today);
      const [allIn, setAllIn] = useState(false);

      useEffect(() => { toolRef.current = todayDone ? tool : 'none'; }, [tool, todayDone]);

      useEffect(() => {
        SoundManager.startMelody();
        return () => SoundManager.stopMelody();
      }, []);
      useChorus(visible > 0 && !night, visible);

      // ── Spiel-Engine ──────────────────────────────────────────────────────
      useEffect(() => {
        const canvas = canvasRef.current, wrap = wrapRef.current;
        if (!canvas || !wrap) return;
        const ctx = canvas.getContext('2d');
        let raf = 0, dpr = 1, W = 0, H = 0;
        const cam = { x: WORLD_W / 2, y: WORLD_H / 2, zoom: 0.6 };

        const resize = () => {
          dpr = Math.min(window.devicePixelRatio || 1, 2);
          W = wrap.clientWidth; H = wrap.clientHeight;
          canvas.width = W * dpr; canvas.height = H * dpr;
          canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        };
        resize();
        const ro = new ResizeObserver(resize); ro.observe(wrap);

        const rnd = mulberry32(98765);
        // Deko
        const deco = [];
        for (let i = 0; i < 16; i++) deco.push({ t: 'tree', x: 80 + rnd() * (WORLD_W - 160), y: 120 + rnd() * (WORLD_H - 200), s: 0.8 + rnd() * 0.6 });
        for (let i = 0; i < 22; i++) deco.push({ t: 'rock', x: 60 + rnd() * (WORLD_W - 120), y: 120 + rnd() * (WORLD_H - 160), s: 0.6 + rnd() * 0.8 });
        const pond = { x: WORLD_W * 0.72, y: WORLD_H * 0.68, rx: 180, ry: 110 };
        deco.sort((a, b) => a.y - b.y);

        // Schafe
        const srnd = mulberry32(424242);
        const sheep = [];
        for (let i = 0; i < visible; i++) {
          const hx = 180 + srnd() * (WORLD_W - 360);
          const hy = 360 + srnd() * (WORLD_H - 440);
          sheep.push({
            id: i, x: hx, y: hy, hx, hy, vx: 0, vy: 0,
            t: srnd() * 100, face: srnd() < 0.5 ? 1 : -1,
            nextMove: srnd() * 3, inStall: false, stage: woolStageFor(i),
          });
        }

        // Eingabe-Status
        const ptrs = new Map();
        let down = false, sx0 = 0, sy0 = 0, lastX = 0, lastY = 0, moved = false, panning = false, downTime = 0;
        let driving = false, fingerW = null, holdTimer = 0, pinchD = 0;

        const screenToWorld = (sx, sy) => ({ x: (sx - W / 2) / cam.zoom + cam.x, y: (sy - H / 2) / cam.zoom + cam.y });
        const clampCam = () => {
          cam.zoom = Math.max(0.35, Math.min(2.5, cam.zoom));
          cam.x = Math.max(0, Math.min(WORLD_W, cam.x));
          cam.y = Math.max(0, Math.min(WORLD_H, cam.y));
        };

        const triggerNight = () => {
          if (engineRef.current.nightFired) return;
          engineRef.current.nightFired = true;
          SoundManager.playMaeh(0.7);
          onPersistGame({ gameDoneDate: today });
          setNight(true);
        };

        const tapAt = (wp) => {
          const interactive = todayDone;
          if (!interactive) return;
          // Tränke?
          if (wp.x > TROUGH.x - 10 && wp.x < TROUGH.x + TROUGH.w + 10 && wp.y > TROUGH.y - 10 && wp.y < TROUGH.y + TROUGH.h + 20) {
            onPersistGame({ waterDate: today }); setWaterOk(true); SoundManager.playMaeh(1.3); return;
          }
          // Schaf scheren?
          if (toolRef.current === 'shear') {
            let best = null, bd = 44;
            sheep.forEach(s => { if (s.inStall) return; const d = Math.hypot(s.x - wp.x, s.y - wp.y); if (d < bd) { bd = d; best = s; } });
            if (best) { best.stage = 0; SoundManager.playMaeh(0.9 + Math.random() * 0.5); onPersistGame({ shorn: { [best.id]: today } }); }
          }
        };

        const onDown = (e) => {
          canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
          ptrs.set(e.pointerId, { x: e.offsetX, y: e.offsetY });
          if (ptrs.size === 2) { const p = [...ptrs.values()]; pinchD = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y); return; }
          down = true; moved = false; panning = false; driving = false;
          sx0 = lastX = e.offsetX; sy0 = lastY = e.offsetY; downTime = performance.now();
          clearTimeout(holdTimer);
          holdTimer = setTimeout(() => {
            if (down && !moved && todayDone) { driving = true; fingerW = screenToWorld(lastX, lastY); }
          }, 650);
        };
        const onMove = (e) => {
          if (ptrs.has(e.pointerId)) ptrs.set(e.pointerId, { x: e.offsetX, y: e.offsetY });
          if (ptrs.size === 2) {
            const p = [...ptrs.values()]; const d = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
            if (pinchD) { cam.zoom *= d / pinchD; clampCam(); } pinchD = d; return;
          }
          if (!down) return;
          lastX = e.offsetX; lastY = e.offsetY;
          if (driving) { fingerW = screenToWorld(lastX, lastY); return; }
          const dx = e.offsetX - sx0, dy = e.offsetY - sy0;
          if (!moved && Math.hypot(dx, dy) > 8) { moved = true; panning = true; clearTimeout(holdTimer); }
          if (panning) {
            const pdx = e.offsetX - (lastPanX ?? e.offsetX), pdy = e.offsetY - (lastPanY ?? e.offsetY);
            cam.x -= pdx / cam.zoom; cam.y -= pdy / cam.zoom; clampCam();
          }
          lastPanX = e.offsetX; lastPanY = e.offsetY;
        };
        let lastPanX = null, lastPanY = null;
        const onUp = (e) => {
          ptrs.delete(e.pointerId);
          if (ptrs.size < 2) pinchD = 0;
          clearTimeout(holdTimer);
          if (down && !moved && !driving && performance.now() - downTime < 400) tapAt(screenToWorld(e.offsetX, e.offsetY));
          down = false; driving = false; panning = false; fingerW = null; lastPanX = lastPanY = null;
        };
        const onWheel = (e) => { e.preventDefault(); cam.zoom *= e.deltaY < 0 ? 1.1 : 0.9; clampCam(); };

        canvas.addEventListener('pointerdown', onDown);
        canvas.addEventListener('pointermove', onMove);
        canvas.addEventListener('pointerup', onUp);
        canvas.addEventListener('pointercancel', onUp);
        canvas.addEventListener('wheel', onWheel, { passive: false });

        // ── Zeichnen ──
        const drawSheep = (s) => {
          const wool = s.stage / 6, bodyR = 13 + wool * 9;
          ctx.fillStyle = 'rgba(30,50,20,0.12)';
          ctx.beginPath(); ctx.ellipse(s.x, s.y + bodyR * 0.75, bodyR * 1.1, bodyR * 0.4, 0, 0, 7); ctx.fill();
          ctx.strokeStyle = '#8b6f5a'; ctx.lineWidth = 3;
          [-0.5, 0.5].forEach(o => { ctx.beginPath(); ctx.moveTo(s.x + o * bodyR * 0.6, s.y + bodyR * 0.3); ctx.lineTo(s.x + o * bodyR * 0.6, s.y + bodyR * 0.95); ctx.stroke(); });
          ctx.fillStyle = wool < 0.2 ? '#f4c9b8' : '#fdfdfd';
          ctx.beginPath(); ctx.ellipse(s.x, s.y, bodyR, bodyR * 0.85, 0, 0, 7); ctx.fill();
          if (wool > 0.15) {
            const puffs = 5 + Math.round(s.stage * 1.6);
            ctx.fillStyle = '#ffffff';
            for (let k = 0; k < puffs; k++) {
              const a = (k / puffs) * Math.PI * 2;
              ctx.beginPath(); ctx.arc(s.x + Math.cos(a) * bodyR * 0.72, s.y + Math.sin(a) * bodyR * 0.55, bodyR * (0.32 + wool * 0.22), 0, 7); ctx.fill();
            }
            ctx.beginPath(); ctx.arc(s.x, s.y - bodyR * 0.1, bodyR * 0.8, 0, 7); ctx.fill();
          }
          const hx = s.x + s.face * bodyR * 0.95, hy = s.y - bodyR * 0.08;
          ctx.fillStyle = '#444b59'; ctx.beginPath(); ctx.ellipse(hx, hy, 7, 8, 0, 0, 7); ctx.fill();
          ctx.beginPath(); ctx.ellipse(hx - s.face * 5, hy - 5, 3, 4.5, 0, 0, 7); ctx.fill();
          ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(hx + s.face * 1.5, hy - 1, 1.7, 0, 7); ctx.fill();
          ctx.fillStyle = '#1f2733'; ctx.beginPath(); ctx.arc(hx + s.face * 2, hy - 1, 0.9, 0, 7); ctx.fill();
        };
        const drawTree = (d) => {
          ctx.fillStyle = '#7a5230'; ctx.fillRect(d.x - 5 * d.s, d.y - 10 * d.s, 10 * d.s, 34 * d.s);
          ctx.fillStyle = '#3f9a4e'; ctx.beginPath(); ctx.arc(d.x, d.y - 22 * d.s, 26 * d.s, 0, 7); ctx.fill();
          ctx.fillStyle = '#4cb35e'; ctx.beginPath(); ctx.arc(d.x - 14 * d.s, d.y - 14 * d.s, 18 * d.s, 0, 7); ctx.fill();
          ctx.beginPath(); ctx.arc(d.x + 15 * d.s, d.y - 16 * d.s, 17 * d.s, 0, 7); ctx.fill();
        };
        const drawBarn = (big) => {
          const w = big ? 200 : 140, h = big ? 130 : 96;
          const x = BARN.x - w / 2, y = BARN.y - h / 2;
          ctx.fillStyle = '#b9533f'; ctx.fillRect(x, y + h * 0.32, w, h * 0.68);
          ctx.fillStyle = '#8c3c2d'; ctx.beginPath(); ctx.moveTo(x - 10, y + h * 0.34); ctx.lineTo(BARN.x, y - 8); ctx.lineTo(x + w + 10, y + h * 0.34); ctx.closePath(); ctx.fill();
          ctx.fillStyle = '#5e2a20'; ctx.fillRect(BARN.x - w * 0.16, y + h * 0.52, w * 0.32, h * 0.48);
        };
        const drawTrough = (filled) => {
          ctx.fillStyle = '#7a5230'; ctx.fillRect(TROUGH.x, TROUGH.y, TROUGH.w, TROUGH.h);
          ctx.fillStyle = filled ? '#4aa3df' : '#5e4a36';
          ctx.fillRect(TROUGH.x + 5, TROUGH.y + (filled ? 6 : 18), TROUGH.w - 10, TROUGH.h - (filled ? 11 : 22));
        };

        let last = performance.now();
        const loop = (now) => {
          const dt = Math.min(40, now - last) / 16.67; last = now;
          // Update
          let activeCount = 0;
          sheep.forEach(s => {
            if (s.inStall) return;
            activeCount++;
            s.t += dt * 0.04;
            if (driving && fingerW) {
              const dx = s.x - fingerW.x, dy = s.y - fingerW.y, dd = Math.hypot(dx, dy);
              if (dd < 230) { const f = (230 - dd) / 230 * 2.4; s.vx += (dx / (dd || 1)) * f; s.vy += (dy / (dd || 1)) * f; s.face = dx < 0 ? -1 : 1; }
            } else {
              s.nextMove -= dt * 0.016;
              if (s.nextMove <= 0) { s.nextMove = 2 + Math.random() * 4; s.vx += (Math.random() - 0.5) * 1.2; s.vy += (Math.random() - 0.5) * 1.0; s.face = s.vx < 0 ? -1 : 1; }
              s.vx += (s.hx - s.x) * 0.0006; s.vy += (s.hy - s.y) * 0.0006;
            }
            s.x += s.vx * dt; s.y += s.vy * dt; s.vx *= 0.9; s.vy *= 0.9;
            s.x = Math.max(60, Math.min(WORLD_W - 60, s.x)); s.y = Math.max(150, Math.min(WORLD_H - 50, s.y));
            // Großzügige Fangzone rund um den Stall (oben-links), damit das Eintreiben machbar ist
            if (todayDone && s.x < BARN.x + 120 && s.y < BARN.y + 140) { s.inStall = true; SoundManager.playMaeh(0.8 + Math.random() * 0.5); }
          });
          if (todayDone && visible > 0 && activeCount === 0) { setAllIn(true); triggerNight(); }

          // Render
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.clearRect(0, 0, W, H);
          const g = ctx.createLinearGradient(0, 0, 0, H);
          g.addColorStop(0, '#a7e08a'); g.addColorStop(1, '#7cc865'); ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
          ctx.save();
          ctx.translate(W / 2, H / 2); ctx.scale(cam.zoom, cam.zoom); ctx.translate(-cam.x, -cam.y);
          // Teich
          ctx.fillStyle = '#5bb0e0'; ctx.beginPath(); ctx.ellipse(pond.x, pond.y, pond.rx, pond.ry, 0, 0, 7); ctx.fill();
          ctx.fillStyle = '#7cc3ea'; ctx.beginPath(); ctx.ellipse(pond.x, pond.y - 10, pond.rx * 0.8, pond.ry * 0.7, 0, 0, 7); ctx.fill();
          drawBarn(streak.current > 500);
          drawTrough(waterOk);
          // Deko + Schafe nach y sortiert
          const drawables = [...deco.map(d => ({ y: d.y, f: () => d.t === 'tree' ? drawTree(d) : (ctx.fillStyle = '#9aa3ad', ctx.beginPath(), ctx.ellipse(d.x, d.y, 9 * d.s, 6 * d.s, 0, 0, 7), ctx.fill()) })),
                             ...sheep.filter(s => !s.inStall).map(s => ({ y: s.y, f: () => drawSheep(s) }))];
          drawables.sort((a, b) => a.y - b.y).forEach(d => d.f());
          ctx.restore();
          raf = requestAnimationFrame(loop);
        };
        raf = requestAnimationFrame(loop);
        engineRef.current = {
          nightFired: doneToday,
          zoomBy: (f) => { cam.zoom *= f; clampCam(); },
          recenter: () => { cam.x = WORLD_W / 2; cam.y = WORLD_H / 2; cam.zoom = 0.6; },
        };

        return () => {
          cancelAnimationFrame(raf); ro.disconnect();
          canvas.removeEventListener('pointerdown', onDown);
          canvas.removeEventListener('pointermove', onMove);
          canvas.removeEventListener('pointerup', onUp);
          canvas.removeEventListener('pointercancel', onUp);
          canvas.removeEventListener('wheel', onWheel);
        };
      }, [visible, todayDone]);

      return (
        <div className="flex flex-col bg-green-100" style={{ height: '100dvh' }}>
          <div className="bg-white px-4 py-3 shadow-sm flex items-center gap-3 flex-none z-10">
            <button onClick={onBack} className="text-green-600 text-lg px-1">←</button>
            <h1 className="text-lg font-bold text-gray-800">🌿 Schafwiese</h1>
            <span className="ml-auto text-sm text-green-700 font-semibold bg-green-100 px-3 py-1 rounded-full">
              {streak.current} 🐑{inStallCount > 0 ? ` (+${inStallCount} im Stall)` : ''}
            </span>
          </div>

          <div ref={wrapRef} className="relative flex-1 overflow-hidden touch-none select-none">
            <canvas ref={canvasRef} className="absolute inset-0 block" style={{ touchAction: 'none' }} />

            {visible === 0 && (
              <div className="absolute inset-0 flex flex-col items-center justify-center text-center px-6 pointer-events-none">
                <span className="text-5xl">🌱</span>
                <p className="text-green-800 font-medium mt-2">Die Wiese ist noch leer.</p>
                <p className="text-sm text-green-700/70">Beantworte deine erste Abfrage!</p>
              </div>
            )}

            {/* Hinweis */}
            {visible > 0 && !night && (
              <div className="absolute top-3 left-1/2 -translate-x-1/2 bg-white/85 rounded-full px-4 py-1.5 text-xs text-gray-600 shadow-sm pointer-events-none max-w-[90%] text-center">
                {!todayDone
                  ? '👀 Nur ansehen – beantworte erst die Fragen, um die Wiese zu pflegen.'
                  : doneToday
                    ? '🌙 Alle Schafe schlafen schon – schau dich ruhig um.'
                    : (tool === 'shear' ? '✂️ Tippe ein Schaf an, um es zu scheren.' : '✋ Zur Belohnung: halte gedrückt, um Schafe in den Stall zu treiben.')}
              </div>
            )}

            {/* Zoom-Buttons */}
            <div className="absolute right-3 bottom-24 flex flex-col gap-2">
              {['+', '−', '⟳'].map((sym, i) => (
                <button key={sym}
                  onClick={() => { const e = engineRef.current; if (!e) return; if (i === 0) e.zoomBy(1.25); else if (i === 1) e.zoomBy(0.8); else e.recenter(); }}
                  className="w-11 h-11 rounded-full bg-white shadow text-gray-700 text-xl font-bold active:scale-90">
                  {sym}
                </button>
              ))}
            </div>

            {/* Toolbar (nur interaktiv) */}
            {todayDone && visible > 0 && !night && (
              <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-3 bg-white/90 rounded-2xl px-3 py-2 shadow">
                <button onClick={() => setTool(t => t === 'shear' ? 'none' : 'shear')}
                  className={`px-4 py-2 rounded-xl text-sm font-semibold ${tool === 'shear' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-700'}`}>
                  ✂️ Scheren
                </button>
                <div className={`px-4 py-2 rounded-xl text-sm font-semibold ${waterOk ? 'bg-blue-100 text-blue-600' : 'bg-amber-100 text-amber-700'}`}>
                  {waterOk ? '💧 Tränke voll' : '💧 Tränke leer'}
                </div>
              </div>
            )}

            {/* Nacht-Overlay */}
            {night && (
              <div className="absolute inset-0 flex flex-col items-center justify-center text-center px-6 anim-fadeIn"
                style={{ background: 'radial-gradient(circle at 50% 40%, rgba(30,41,79,0.85), rgba(10,12,30,0.96))' }}>
                <div className="text-6xl mb-3">🌙</div>
                <h2 className="text-2xl font-bold text-white mb-1">Gute Nacht!</h2>
                <p className="text-indigo-200 text-sm mb-8 max-w-xs">Alle Schafe sind im Stall. Sie schlafen – und du darfst das auch. 💤</p>
                <Btn variant="primary" onClick={onBack} className="w-full max-w-xs">Schließen</Btn>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ── Auswertung: Helpers ─────────────────────────────────────────────────
    // Kurzlabels für den Fragenfilter (Dropdown)
    const QUESTION_SHORT = {
      q_lieb_zu_mir:           'Lieb zu mir',
      q_spiegel:               'Im Spiegel angelächelt',
      q_geduldig_mit_mir:      'Geduldig mit mir',
      q_geduldig_mit_anderen:  'Geduldig mit anderen',
      q_stress:                'Nicht gestresst',
      q_mahlzeiten:            'Ausgewogene Mahlzeiten',
      q_welche_mahlzeit:       'Welche Mahlzeit(en) nicht',
      q_zeit_fuer_mich:        'Zeit für mich genommen',
      q_wie_viel:              'Wie viel Zeit',
      q_fuer_was:              'Wofür Zeit genommen',
      q_warum_nicht:           'Ausreden (keine Zeit)',
      q_freude:                'Freude / Lachen',
      q_stolz:                 'Worauf stolz',
      q_sonntag_entscheidung:  'Eigene Entscheidung',
      q_waage:                 'Waage 3× / Woche',
      q_trennung:              'Von etwas getrennt',
      q_trennung_was:          'Wovon getrennt',
    };

    const completedList = (entries) =>
      Object.entries(entries || {})
        .filter(([, e]) => e && e.completed && !e.draft)
        .map(([date, e]) => ({ date, answers: e.answers || {} }))
        .sort((a, b) => a.date < b.date ? -1 : 1);

    const answerVal = (entry, qid) => {
      const a = entry.answers[qid];
      if (!a || a.value === null || a.value === undefined) return null;
      return a.value;
    };

    // Numerischer Wert für Diagramme: scale 0-100, bool→0/100, duration→Stunden
    const numericVal = (entry, qid, qtype) => {
      const v = answerVal(entry, qid);
      if (v === null) return null;
      if (qtype === 'bool') return v === true ? 100 : 0;
      return typeof v === 'number' ? v : null;
    };

    // Gemeinsamer Farbcode (Wert 0–100) für Heatmap UND Balkendiagramm → homogen
    const GREEN = '#22c55e';
    const VALUE_COLORS = ['#fecaca', '#fed7aa', '#fde68a', '#86efac', '#22c55e']; // 0,25,50,75,100
    const valueColor = (v) => {
      if (v === null || v === undefined || isNaN(v)) return '#e5e7eb';
      return VALUE_COLORS[Math.min(4, Math.max(0, Math.round(v / 25)))];
    };

    // Heatmap-Farbe je nach Fragentyp (nutzt denselben valueColor wie die Balken)
    const cellColor = (entry, qid, qtype) => {
      if (!entry) return '#e5e7eb';                 // kein Eintrag
      if (qid === '__completion') return GREEN;     // beantwortet
      const v = answerVal(entry, qid);
      if (v === null) return '#f1f5f9';             // Tag beantwortet, aber Frage ohne Wert
      if (qtype === 'scale') return valueColor(v);
      if (qtype === 'bool')  return valueColor(v === true ? 100 : 0);
      return GREEN; // text / duration: einfach „vorhanden"
    };

    // Zeitraum-Optionen für die Textfeld-KI-Analyse
    const TEXT_PERIODS = [
      { id: '7',   label: 'Letzte 7 Tage',     days: 7 },
      { id: '30',  label: 'Letzte 30 Tage',    days: 30 },
      { id: '90',  label: 'Letzte 90 Tage',    days: 90 },
      { id: '365', label: 'Letztes Jahr',      days: 365 },
      { id: 'all', label: 'Gesamter Zeitraum', days: null },
    ];

    // Letzte N Tage als dateKey-Liste (älteste zuerst)
    const lastNDays = (n) => {
      const out = [];
      const today = new Date();
      for (let i = n - 1; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        out.push(dateKey(d));
      }
      return out;
    };

    // Balkendiagramm-Daten je nach Periode
    const bucketData = (entries, qid, qtype, period) => {
      const byDate = {};
      completedList(entries).forEach(e => { byDate[e.date] = e; });
      const avg = (vals) => vals.length ? Math.round(vals.reduce((a, b) => a + b, 0) / vals.length) : null;
      const avgF = (vals) => vals.length ? Math.round((vals.reduce((a, b) => a + b, 0) / vals.length) * 4) / 4 : null;

      if (period === 'days') {
        return lastNDays(30).map(dk => {
          const e = byDate[dk];
          const v = e ? numericVal(e, qid, qtype) : null;
          return { label: dk.slice(8), value: qtype === 'duration' ? (v === null ? null : v) : v };
        });
      }
      // Wochen / Monate: gruppieren + Durchschnitt
      const buckets = [];
      const now = new Date();
      const count = 12;
      for (let i = count - 1; i >= 0; i--) {
        let label, from, to;
        if (period === 'weeks') {
          const end = new Date(now); end.setDate(now.getDate() - i * 7);
          const start = new Date(end); start.setDate(end.getDate() - 6);
          from = dateKey(start); to = dateKey(end);
          label = 'KW' + start.getDate();
        } else { // months
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          from = dateKey(new Date(d.getFullYear(), d.getMonth(), 1));
          to = dateKey(new Date(d.getFullYear(), d.getMonth() + 1, 0));
          label = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][d.getMonth()];
        }
        const vals = Object.keys(byDate)
          .filter(dk => dk >= from && dk <= to)
          .map(dk => numericVal(byDate[dk], qid, qtype))
          .filter(v => v !== null);
        buckets.push({ label, value: qtype === 'duration' ? avgF(vals) : avg(vals) });
      }
      return buckets;
    };

    // Verteilungs-Daten fürs Kuchendiagramm
    const distData = (entries, qid, qtype) => {
      const list = completedList(entries);
      if (qtype === 'scale') {
        const counts = { 100: 0, 75: 0, 50: 0, 25: 0, 0: 0 };
        list.forEach(e => { const v = answerVal(e, qid); if (v !== null && v in counts) counts[v]++; });
        const colors = { 100: '#22c55e', 75: '#86efac', 50: '#fde68a', 25: '#fed7aa', 0: '#fecaca' };
        return SCALE_OPTIONS.map(o => ({ name: o.label, value: counts[o.value], color: colors[o.value] }))
          .filter(d => d.value > 0);
      }
      if (qtype === 'bool') {
        let yes = 0, no = 0;
        list.forEach(e => { const v = answerVal(e, qid); if (v === true) yes++; else if (v === false) no++; });
        return [
          { name: 'Ja', value: yes, color: '#22c55e' },
          { name: 'Nein', value: no, color: '#fca5a5' },
        ].filter(d => d.value > 0);
      }
      return [];
    };

    // Zusammenfassungs-Statistik (Prozent/Stunden + Anzahl)
    const summaryStat = (entries, qid, qtype) => {
      const list = completedList(entries);
      const vals = list.map(e => numericVal(e, qid, qtype)).filter(v => v !== null);
      if (!vals.length) return null;
      const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
      if (qtype === 'duration') {
        return { main: (Math.round(mean * 4) / 4).toFixed(2).replace(/\.?0+$/, '') + ' Std', sub: `Ø über ${vals.length} Tage`, pct: null };
      }
      return { main: Math.round(mean) + '%', sub: qtype === 'bool' ? `Ja an ${Math.round(mean)}% der Tage` : `Ø über ${vals.length} Tage`, pct: Math.round(mean) };
    };

    // ── Stats Screen (Auswertung) ───────────────────────────────────────────
    const StatsScreen = ({ entries, apiKey, onBack }) => {
      const RC = window.Recharts;
      const [qid, setQid]         = useState('__completion');
      const [period, setPeriod]   = useState('days');
      const [textPeriod, setTextPeriod] = useState('30');
      const [analysis, setAnalysis] = useState(null);
      const [analyzing, setAnalyzing] = useState(false);
      const [error, setError]     = useState(null);

      const question = QUESTIONS.find(q => q.id === qid);
      const qtype = qid === '__completion' ? 'completion' : (question ? question.type : null);

      const list = completedList(entries);
      const heatDays = lastNDays(126);
      const byDate = {};
      list.forEach(e => { byDate[e.date] = e; });

      // Leading-Padding, damit Spalten nach Wochentag (Mo-first) ausgerichtet sind
      const firstWeekday = (new Date(heatDays[0] + 'T12:00:00').getDay() + 6) % 7;

      const stat   = (qtype === 'scale' || qtype === 'bool' || qtype === 'duration') ? summaryStat(entries, qid, qtype) : null;
      const bars   = (qtype === 'scale' || qtype === 'bool' || qtype === 'duration') ? bucketData(entries, qid, qtype, period) : [];
      const pie    = (qtype === 'scale' || qtype === 'bool') ? distData(entries, qid, qtype) : [];
      const isPct  = qtype === 'scale' || qtype === 'bool';

      const tp = TEXT_PERIODS.find(p => p.id === textPeriod) || TEXT_PERIODS[1];
      const textCutoff = tp.days ? lastNDays(tp.days)[0] : '0000-00-00';
      const textAnswers = qtype === 'text'
        ? list.map(e => ({ date: e.date, text: answerVal(e, qid) }))
              .filter(x => x.text && x.date >= textCutoff)
        : [];

      const runAnalysis = async () => {
        setError(null);
        if (!apiKey) { setError('Kein API-Schlüssel in den Einstellungen hinterlegt.'); return; }
        if (!textAnswers.length) { setError('Keine Antworten für diese Frage vorhanden.'); return; }
        setAnalyzing(true);
        setAnalysis(null);
        try {
          const frageText = question.text;
          const corpus = textAnswers.map(x => `[${x.date}] ${x.text}`).join('\n');
          const system = 'Du bist eine einfühlsame Self-Care-Begleiterin. Analysiere die Tagebuch-Antworten einer Person über einen Zeitraum. Antworte in liebevoller, motivierender und unterstützender Prosa auf Deutsch (2–4 Absätze). Verschleiere keine Fakten, benenne auch Muster oder Sorgen ehrlich, aber wohlwollend. Sprich die Person direkt mit „du" an.';
          const user = `Frage: „${frageText}"\nZeitraum: ${tp.label}\n\nAntworten über die Zeit:\n${corpus}`;
          const result = await callClaude(apiKey, MODEL_SONNET, system, user, 1024);
          setAnalysis(result);
        } catch (e) {
          setError(e.message || 'Analyse fehlgeschlagen.');
        } finally {
          setAnalyzing(false);
        }
      };

      const Card = ({ children, className = '' }) => (
        <div className={`bg-white rounded-2xl p-4 shadow-sm ${className}`}>{children}</div>
      );

      return (
        <div className="flex flex-col bg-green-50" style={{ minHeight: '100dvh' }}>
          <div className="bg-white px-4 py-4 shadow-sm flex items-center gap-3 flex-none">
            <button onClick={onBack} className="text-green-600 text-lg px-1">←</button>
            <h1 className="text-xl font-bold text-gray-800">📊 Auswertung</h1>
            <span className="ml-auto text-xs text-gray-400">{list.length} Tage erfasst</span>
          </div>

          <div className="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-4">
            {list.length === 0 && (
              <Card className="text-center">
                <span className="text-5xl">🌱</span>
                <p className="text-gray-500 font-medium mt-2">Noch keine Daten.</p>
                <p className="text-sm text-gray-400">Beantworte deine erste Abfrage, dann erscheint hier deine Auswertung.</p>
              </Card>
            )}

            {list.length > 0 && (
              <>
                {/* Fragenfilter */}
                <Card>
                  <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Frage auswählen</label>
                  <select
                    value={qid}
                    onChange={e => { setQid(e.target.value); setAnalysis(null); setError(null); }}
                    className="w-full mt-2 px-3 py-2.5 border-2 border-gray-200 rounded-xl bg-white text-gray-800 text-sm"
                  >
                    <option value="__completion">🗓️ Allgemein: beantwortete Tage</option>
                    {QUESTIONS.map(q => (
                      <option key={q.id} value={q.id}>
                        {q.type === 'text' ? '✍️' : q.type === 'scale' ? '📊' : q.type === 'bool' ? '✓' : '⏱️'} {QUESTION_SHORT[q.id] || q.id}
                      </option>
                    ))}
                  </select>
                </Card>

                {/* Kalender-Heatmap */}
                <Card>
                  <p className="text-sm font-semibold text-gray-700 mb-3">Kalender (letzte 18 Wochen)</p>
                  <div className="overflow-x-auto">
                    <div
                      style={{
                        display: 'grid',
                        gridTemplateRows: 'repeat(7, 13px)',
                        gridAutoFlow: 'column',
                        gap: '3px',
                        width: 'max-content',
                      }}
                    >
                      {Array.from({ length: firstWeekday }).map((_, i) => (
                        <div key={'pad' + i} style={{ width: 13, height: 13 }} />
                      ))}
                      {heatDays.map(dk => (
                        <div
                          key={dk}
                          title={dk}
                          style={{
                            width: 13, height: 13, borderRadius: 3,
                            background: cellColor(byDate[dk], qid, qtype),
                          }}
                        />
                      ))}
                    </div>
                  </div>
                  <div className="flex items-center gap-3 mt-3 text-xs text-gray-400 flex-wrap">
                    {qtype === 'scale' && <>
                      <span className="flex items-center gap-1"><i style={{ width: 10, height: 10, background: '#fecaca', borderRadius: 2, display: 'inline-block' }} /> 0%</span>
                      <span className="flex items-center gap-1"><i style={{ width: 10, height: 10, background: '#fde68a', borderRadius: 2, display: 'inline-block' }} /> 50%</span>
                      <span className="flex items-center gap-1"><i style={{ width: 10, height: 10, background: '#22c55e', borderRadius: 2, display: 'inline-block' }} /> 100%</span>
                    </>}
                    {qtype === 'bool' && <>
                      <span className="flex items-center gap-1"><i style={{ width: 10, height: 10, background: '#22c55e', borderRadius: 2, display: 'inline-block' }} /> Ja</span>
                      <span className="flex items-center gap-1"><i style={{ width: 10, height: 10, background: '#fca5a5', borderRadius: 2, display: 'inline-block' }} /> Nein</span>
                    </>}
                    {(qtype === 'completion' || qtype === 'text' || qtype === 'duration') && <>
                      <span className="flex items-center gap-1"><i style={{ width: 10, height: 10, background: '#22c55e', borderRadius: 2, display: 'inline-block' }} /> beantwortet</span>
                      <span className="flex items-center gap-1"><i style={{ width: 10, height: 10, background: '#e5e7eb', borderRadius: 2, display: 'inline-block' }} /> offen</span>
                    </>}
                  </div>
                </Card>

                {/* Zusammenfassung */}
                {stat && (
                  <Card className="text-center">
                    <p className="text-xs text-gray-400 uppercase tracking-wide">{QUESTION_SHORT[qid]}</p>
                    <p className="text-4xl font-extrabold text-green-600 my-1">{stat.main}</p>
                    <p className="text-sm text-gray-500">{stat.sub}</p>
                  </Card>
                )}

                {/* Balkendiagramm */}
                {(qtype === 'scale' || qtype === 'bool' || qtype === 'duration') && (
                  <Card>
                    <div className="flex items-center justify-between mb-3">
                      <p className="text-sm font-semibold text-gray-700">Verlauf</p>
                      <select
                        value={period}
                        onChange={e => setPeriod(e.target.value)}
                        className="text-xs border border-gray-200 rounded-lg px-2 py-1 bg-white text-gray-600"
                      >
                        <option value="days">30 Tage</option>
                        <option value="weeks">12 Wochen</option>
                        <option value="months">12 Monate</option>
                      </select>
                    </div>
                    {RC ? (
                      <div style={{ width: '100%', height: 180 }}>
                        <RC.ResponsiveContainer width="100%" height="100%">
                          <RC.BarChart data={bars} margin={{ top: 4, right: 4, left: -20, bottom: 0 }}>
                            <RC.XAxis dataKey="label" tick={{ fontSize: 9 }} interval="preserveStartEnd" />
                            <RC.YAxis tick={{ fontSize: 9 }} domain={isPct ? [0, 100] : [0, 'auto']} />
                            <RC.Tooltip formatter={(v) => isPct ? v + '%' : v + ' Std'} labelStyle={{ fontSize: 11 }} />
                            <RC.Bar dataKey="value" radius={[3, 3, 0, 0]}>
                              {bars.map((d, i) => (
                                <RC.Cell key={i} fill={qtype === 'duration' ? GREEN : valueColor(d.value)} />
                              ))}
                            </RC.Bar>
                          </RC.BarChart>
                        </RC.ResponsiveContainer>
                      </div>
                    ) : (
                      <p className="text-xs text-gray-400">Diagramm-Bibliothek nicht geladen.</p>
                    )}
                  </Card>
                )}

                {/* Kuchendiagramm */}
                {pie.length > 0 && RC && (
                  <Card>
                    <p className="text-sm font-semibold text-gray-700 mb-2">Verteilung</p>
                    <div style={{ width: '100%', height: 200 }}>
                      <RC.ResponsiveContainer width="100%" height="100%">
                        <RC.PieChart>
                          <RC.Pie data={pie} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={70} label={(e) => e.value}>
                            {pie.map((d, i) => <RC.Cell key={i} fill={d.color} />)}
                          </RC.Pie>
                          <RC.Tooltip />
                        </RC.PieChart>
                      </RC.ResponsiveContainer>
                    </div>
                    <div className="flex flex-wrap gap-2 justify-center mt-1">
                      {pie.map((d, i) => (
                        <span key={i} className="flex items-center gap-1 text-xs text-gray-500">
                          <i style={{ width: 10, height: 10, background: d.color, borderRadius: 2, display: 'inline-block' }} /> {d.name} ({d.value})
                        </span>
                      ))}
                    </div>
                  </Card>
                )}

                {/* Textfragen: Antworten + KI-Analyse */}
                {qtype === 'text' && (
                  <Card>
                    <div className="flex items-center justify-between mb-1">
                      <p className="text-sm font-semibold text-gray-700">KI-Analyse (Claude Sonnet)</p>
                      <select
                        value={textPeriod}
                        onChange={e => { setTextPeriod(e.target.value); setAnalysis(null); setError(null); }}
                        className="text-xs border border-gray-200 rounded-lg px-2 py-1 bg-white text-gray-600"
                      >
                        {TEXT_PERIODS.map(p => <option key={p.id} value={p.id}>{p.label}</option>)}
                      </select>
                    </div>
                    <p className="text-xs text-gray-400 mb-3">{textAnswers.length} Antwort{textAnswers.length !== 1 ? 'en' : ''} im gewählten Zeitraum</p>

                    {error && (
                      <div className="mb-3 px-3 py-2 bg-red-50 border border-red-200 rounded-xl text-xs text-red-600">{error}</div>
                    )}

                    {analysis && (
                      <div className="mb-3 px-4 py-3 bg-green-50 border border-green-200 rounded-xl text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">
                        {analysis}
                      </div>
                    )}

                    <Btn variant="primary" onClick={runAnalysis} disabled={analyzing} className="w-full">
                      {analyzing ? 'Analysiere…' : '✨ Analyse starten'}
                    </Btn>

                    {textAnswers.length > 0 && (
                      <div className="mt-4 flex flex-col gap-2">
                        {textAnswers.slice().reverse().map((x, i) => (
                          <div key={i} className="px-3 py-2 bg-gray-50 rounded-xl">
                            <p className="text-xs text-gray-400">{x.date}</p>
                            <p className="text-sm text-gray-700">{x.text}</p>
                          </div>
                        ))}
                      </div>
                    )}
                  </Card>
                )}
              </>
            )}
          </div>
        </div>
      );
    };

    // ── Settings Screen ─────────────────────────────────────────────────────
    const SettingsScreen = ({ settings, data, streak, onSave, onPersist, onImport, onBack }) => {
      const [s, setS] = useState({ ...settings });
      const [saved, setSaved] = useState(false);
      const [pushMsg, setPushMsg] = useState(null);
      const [pushBusy, setPushBusy] = useState(false);
      const fileRef = useRef(null);

      const upd = (k, v) => setS(prev => ({ ...prev, [k]: v }));

      const handleSave = () => {
        onSave(s);
        setSaved(true);
        setTimeout(() => setSaved(false), 1500);
      };

      const enablePush = async () => {
        setPushBusy(true); setPushMsg(null);
        try {
          await PushClient.enable(pushPrefs(s, streak));
          const next = { ...s, pushSubscribed: true };
          setS(next);
          await onPersist(next);
          setPushMsg({ ok: true, text: 'Push aktiviert! 🔔' });
        } catch (e) {
          setPushMsg({ ok: false, text: e.message });
        } finally {
          setPushBusy(false);
        }
      };

      const exportData = () => {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `sheepcare-backup-${dateKey()}.json`;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      };

      const importFile = (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            if (!parsed || typeof parsed !== 'object' || !('entries' in parsed) || !('streak' in parsed)) {
              throw new Error('Ungültige Backup-Datei.');
            }
            const days = Object.keys(parsed.entries || {}).length;
            if (!window.confirm(`Backup mit ${days} Tag(en) importieren?\nDeine aktuellen Daten werden überschrieben.`)) return;
            onImport(parsed);
          } catch (e) {
            alert('Import fehlgeschlagen: ' + e.message);
          }
        };
        reader.readAsText(file);
      };

      const Toggle = ({ value, onChange }) => (
        <button
          onClick={() => onChange(!value)}
          className={`relative w-14 h-7 rounded-full transition-colors ${value ? 'bg-green-500' : 'bg-gray-300'}`}
        >
          <div className={`absolute top-0.5 left-0.5 w-6 h-6 bg-white rounded-full shadow transition-transform ${value ? 'translate-x-7' : 'translate-x-0'}`} />
        </button>
      );

      return (
        <div className="flex flex-col bg-green-50" style={{ minHeight: '100dvh' }}>
          {saved && <Toast msg="Einstellungen gespeichert ✓" />}
          <div className="bg-white px-4 py-4 shadow-sm flex items-center gap-3 flex-none">
            <button onClick={onBack} className="text-green-600 text-lg px-1">←</button>
            <h1 className="text-xl font-bold text-gray-800">⚙️ Einstellungen</h1>
          </div>

          <div className="flex-1 overflow-y-auto px-4 py-5 flex flex-col gap-4">
            {/* Sound */}
            <div className="bg-white rounded-2xl p-4 shadow-sm">
              <div className="flex items-center justify-between">
                <div>
                  <p className="font-semibold text-gray-800">🔊 Töne</p>
                  <p className="text-sm text-gray-500">Schaf-Sounds & Melodie</p>
                </div>
                <Toggle value={s.soundEnabled} onChange={v => upd('soundEnabled', v)} />
              </div>
            </div>

            {/* Push */}
            <div className="bg-white rounded-2xl p-4 shadow-sm">
              <p className="font-semibold text-gray-800 mb-4">🔔 Erinnerungen (Android)</p>

              <div className="flex items-center justify-between mb-2">
                <div>
                  <p className="text-sm font-medium text-gray-700">Abend-Erinnerung</p>
                  <p className="text-xs text-gray-400">Du musst noch Schafpflege betreiben!</p>
                </div>
                <Toggle value={s.push20Enabled} onChange={v => upd('push20Enabled', v)} />
              </div>
              {s.push20Enabled && (
                <input type="time" value={s.push20Time} onChange={e => upd('push20Time', e.target.value)}
                  className="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm mb-4" />
              )}

              <div className="flex items-center justify-between mb-2">
                <div>
                  <p className="text-sm font-medium text-gray-700">Letzte-Chance-Alarm</p>
                  <p className="text-xs text-gray-400">Ohne Schafpflege laufen die Schafe weg!</p>
                </div>
                <Toggle value={s.push23Enabled} onChange={v => upd('push23Enabled', v)} />
              </div>
              {s.push23Enabled && (
                <input type="time" value={s.push23Time} onChange={e => upd('push23Time', e.target.value)}
                  className="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm mb-3" />
              )}

              {s.pushSubscribed ? (
                <div className="mt-3 px-3 py-2.5 bg-green-50 border border-green-200 rounded-xl text-xs text-green-700 flex items-center gap-2">
                  ✅ Push-Benachrichtigungen sind auf diesem Gerät aktiviert.
                </div>
              ) : (
                <Btn variant="secondary" onClick={enablePush} disabled={pushBusy} className="w-full mt-3 py-3">
                  {pushBusy ? 'Aktiviere…' : '🔔 Push auf diesem Gerät aktivieren'}
                </Btn>
              )}
              {pushMsg && (
                <div className={`mt-2 px-3 py-2 rounded-xl text-xs ${pushMsg.ok ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-600 border border-red-200'}`}>
                  {pushMsg.text}
                </div>
              )}
              <div className="mt-2 px-3 py-2.5 bg-amber-50 border border-amber-200 rounded-xl text-xs text-amber-700">
                ℹ️ Echter Background-Push (auch bei geschlossener App) läuft über einen kleinen Cloudflare-Worker. Setup-Anleitung: <span className="font-mono">worker/README.md</span>.
              </div>
            </div>

            {/* Daten-Backup */}
            <div className="bg-white rounded-2xl p-4 shadow-sm">
              <p className="font-semibold text-gray-800 mb-1">💾 Daten-Backup</p>
              <p className="text-sm text-gray-500 mb-3">Exportiere deine Daten regelmäßig – beim Löschen der Website-Daten gehen sie sonst verloren.</p>
              <div className="flex gap-3">
                <Btn variant="secondary" onClick={exportData} className="flex-1 py-3">⬇️ Export</Btn>
                <Btn variant="secondary" onClick={() => fileRef.current && fileRef.current.click()} className="flex-1 py-3">⬆️ Import</Btn>
              </div>
              <input
                ref={fileRef}
                type="file"
                accept="application/json"
                className="hidden"
                onChange={e => { importFile(e.target.files[0]); e.target.value = ''; }}
              />
            </div>

            {/* API Key */}
            <div className="bg-white rounded-2xl p-4 shadow-sm">
              <p className="font-semibold text-gray-800 mb-1">🔑 Claude API-Schlüssel</p>
              <p className="text-sm text-gray-500 mb-3">Für Motivationssprüche & Textanalysen. Wird nur lokal gespeichert.</p>
              <input
                type="password"
                value={s.apiKey}
                onChange={e => upd('apiKey', e.target.value)}
                placeholder="sk-ant-api03-…"
                className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl text-sm font-mono focus:border-green-400 focus:outline-none"
              />
            </div>

            <Btn variant="primary" onClick={handleSave} className="w-full">
              Speichern ✓
            </Btn>
          </div>
        </div>
      );
    };

    // ── Start Screen ────────────────────────────────────────────────────────
    const StartScreen = ({ data, streak, motivation, todayDone, todayDraft, onStart, onNavigate }) => {
      const status = todayDone ? 'C' : streak.current > 0 ? 'A' : 'B';

      return (
        <div className="flex flex-col bg-green-50" style={{ minHeight: '100dvh' }}>
          <div className="flex-1 flex flex-col items-center justify-center px-6 pt-10 pb-4 text-center overflow-y-auto">

            {motivation && (
              <div className="anim-fadeIn mb-5 max-w-xs mx-auto bg-white border border-green-100 rounded-3xl px-5 py-3 shadow-sm relative">
                <p className="text-sm text-gray-700 leading-snug">{motivation}</p>
              </div>
            )}


            {status === 'C' && (
              <div className="anim-slideUp">
                <SheepSVG size={120} className="anim-float mx-auto" />
                <h1 className="text-2xl font-bold text-green-700 mt-5 mb-2">
                  Heute schon erledigt! 🎉
                </h1>
                <p className="text-gray-600 mb-1">
                  Du hast{' '}
                  <span className="font-extrabold text-green-600 text-2xl">{streak.current}</span>
                  {' '}Schaf{streak.current !== 1 ? 'e' : ''} gesammelt
                </p>
                {streak.best > 0 && (
                  <p className="text-xs text-gray-400">Rekord: {streak.best} Schafe 🏆</p>
                )}
              </div>
            )}

            {status === 'A' && (
              <div className="anim-slideUp">
                <div className="mb-4 rounded-3xl overflow-hidden w-44 h-44 mx-auto bg-green-100 flex items-center justify-center">
                  <img
                    src="./img/title-streak.png"
                    alt="Grasendes Schaf"
                    className="w-full h-full object-cover"
                    onError={e => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }}
                  />
                  <div style={{ display: 'none' }} className="w-full h-full items-center justify-center">
                    <SheepSVG size={120} className="anim-float" />
                  </div>
                </div>
                <h1 className="text-2xl font-bold text-gray-800 mb-2">
                  Du willst heute noch<br />ein Schaf sammeln 🐑
                </h1>
                <p className="text-gray-500 text-sm">
                  Lauf: <span className="font-bold text-green-600">{streak.current}</span> Tage am Stück
                  {streak.best > 0 && <> · Rekord: <span className="font-bold">{streak.best}</span> 🏆</>}
                </p>
              </div>
            )}

            {status === 'B' && (
              <div className="anim-slideUp">
                <div className="mb-4 rounded-3xl overflow-hidden w-44 mx-auto bg-amber-50 flex items-center justify-center" style={{ height: 200 }}>
                  <img
                    src="./img/title-broken.png"
                    alt="Schäfer repariert Zaun"
                    className="w-full h-full object-cover"
                    onError={e => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }}
                  />
                  <div style={{ display: 'none' }} className="w-full h-full items-center justify-center">
                    <ShepherdSVG size={130} />
                  </div>
                </div>
                <h1 className="text-2xl font-bold text-gray-800 mb-2">
                  Du willst heute noch<br />ein Schaf sammeln 🐑
                </h1>
                <p className="text-gray-500 text-sm">Starte deinen ersten Lauf!</p>
              </div>
            )}

            {todayDraft && !todayDone && (
              <div className="mt-4 px-4 py-2 bg-amber-50 border border-amber-200 rounded-full text-sm text-amber-700">
                📝 Du hast einen angefangenen Eintrag
              </div>
            )}
          </div>

          {/* CTA Button */}
          {!todayDone && (
            <div className="px-6 pb-3">
              <Btn variant="primary" onClick={onStart} className="w-full text-lg py-5">
                {todayDraft ? '🐑 Weitermachen' : '🐑 Auf geht\'s!'}
              </Btn>
            </div>
          )}

          {todayDone && (
            <div className="px-6 pb-3">
              <Btn variant="secondary" onClick={() => onNavigate('meadow')} className="w-full text-lg py-4">
                🌿 Zur Schafwiese
              </Btn>
            </div>
          )}

          {/* Bottom nav */}
          <div className="bg-white border-t border-gray-100 flex-none" style={{ paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))' }}>
            <div className="flex">
              {[
                { id: 'meadow',   icon: '🌿', label: 'Wiese' },
                { id: 'stats',    icon: '📊', label: 'Auswertung' },
                { id: 'settings', icon: '⚙️',  label: 'Einstellungen' },
              ].map(({ id, icon, label }) => (
                <button
                  key={id}
                  onClick={() => onNavigate(id)}
                  className="flex-1 flex flex-col items-center gap-0.5 py-3 text-gray-400 active:text-green-600 transition-colors"
                >
                  <span className="text-2xl leading-none">{icon}</span>
                  <span className="text-xs font-medium">{label}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ── App Root ────────────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState('loading');
      const [data,   setData]   = useState(null);
      const [motivation, setMotivation] = useState('');

      // Audio erst bei erster Interaktion entsperren (Browser-Autoplay-Policy).
      // Kein eager AudioContext beim Mount – sonst „suspended"-Warnung.
      useEffect(() => {
        const unlock = () => SoundManager.unlock();
        window.addEventListener('pointerdown', unlock, { once: true });
        return () => window.removeEventListener('pointerdown', unlock);
      }, []);

      // Sound-Einstellung übernehmen
      useEffect(() => {
        if (data) SoundManager.setEnabled(data.settings.soundEnabled);
      }, [data && data.settings.soundEnabled]);

      useEffect(() => {
        loadData().then(d => {
          const status = streakStatus(d.streak);
          if (status === 'broken') {
            const updated = { ...d, streak: { ...d.streak, current: 0 } };
            setData(updated);
            saveData(updated);
            setScreen('streakBroken');
          } else {
            setData(d);
            setScreen('start');
          }
        });
      }, []);

      // Tages-Motivationsspruch (1×/Tag via Haiku, sonst lokaler Fallback)
      useEffect(() => {
        if (!data) return;
        let cancelled = false;
        getDailyMotivation(data, data.settings.apiKey).then(({ text, changed }) => {
          if (cancelled) return;
          setMotivation(text);
          if (changed) {
            const updated = { ...data, dailyMotivation: { date: dateKey(), text } };
            setData(updated);
            saveData(updated);
          }
        });
        return () => { cancelled = true; };
      }, [!!data, data && data.dailyMotivation ? data.dailyMotivation.date : null]);

      const today       = dateKey();
      const todayEntry  = data?.entries?.[today];
      const todayDone   = !!(todayEntry?.completed && !todayEntry?.draft);
      const todayDraft  = !!(todayEntry && !todayDone);

      const handleFinalSave = async (answers) => {
        const status  = streakStatus(data.streak);
        const newCurr = status === 'active' ? data.streak.current + 1 : 1;
        const newBest = Math.max(data.streak.best, newCurr);

        const updated = {
          ...data,
          entries: {
            ...data.entries,
            [today]: {
              appSchemaVersion: APP_SCHEMA_VERSION,
              completed: true,
              draft: false,
              completedAt: new Date().toISOString(),
              answers,
            },
          },
          streak: { current: newCurr, best: newBest, lastCompletedDate: today },
        };
        setData(updated);
        await saveData(updated);
        if (updated.settings.pushSubscribed) PushClient.sync(pushPrefs(updated.settings, updated.streak));
        setScreen('reward');
      };

      const handleDraftSave = async (answers) => {
        const updated = {
          ...data,
          entries: {
            ...data.entries,
            [today]: {
              appSchemaVersion: APP_SCHEMA_VERSION,
              completed: false,
              draft: true,
              savedAt: new Date().toISOString(),
              answers,
            },
          },
        };
        setData(updated);
        await saveData(updated);
      };

      const handleGamePersist = async (patch) => {
        const updated = {
          ...data,
          game: { ...data.game, ...patch, shorn: { ...data.game.shorn, ...(patch.shorn || {}) } },
        };
        setData(updated);
        await saveData(updated);
      };

      const handleSaveSettings = async (newSettings) => {
        const updated = { ...data, settings: newSettings };
        setData(updated);
        await saveData(updated);
        if (newSettings.pushSubscribed) PushClient.sync(pushPrefs(newSettings, updated.streak));
        setScreen('start');
      };

      // Persistiert Settings ohne Navigation (z.B. nach Push-Aktivierung)
      const persistSettings = async (newSettings) => {
        const updated = { ...data, settings: newSettings };
        setData(updated);
        await saveData(updated);
      };

      const handleImport = async (raw) => {
        const migrated = migrateData(raw);
        setData(migrated);
        await saveData(migrated);
        setMotivation('');
        setScreen('start');
      };

      // ── Screens ──
      if (screen === 'loading' || !data) {
        return (
          <div className="flex flex-col items-center justify-center bg-green-50" style={{ minHeight: '100dvh' }}>
            <SheepSVG size={90} className="anim-float" />
            <p className="text-green-600 mt-5 font-semibold text-lg">SheepCare wird geladen…</p>
          </div>
        );
      }

      if (screen === 'streakBroken') {
        return <StreakBrokenScreen onContinue={() => setScreen('start')} />;
      }

      if (screen === 'questionnaire') {
        return (
          <Questionnaire
            existingDraft={todayDraft ? todayEntry : null}
            apiKey={data.settings.apiKey}
            onFinalSave={handleFinalSave}
            onDraftSave={handleDraftSave}
            onBack={() => setScreen('start')}
          />
        );
      }

      if (screen === 'reward') {
        return <RewardScreen streak={data.streak} onContinue={() => setScreen('start')} />;
      }

      if (screen === 'settings') {
        return <SettingsScreen settings={data.settings} data={data} streak={data.streak} onSave={handleSaveSettings} onPersist={persistSettings} onImport={handleImport} onBack={() => setScreen('start')} />;
      }

      if (screen === 'meadow') {
        return <MeadowScreen streak={data.streak} game={data.game} todayDone={todayDone} onPersistGame={handleGamePersist} onBack={() => setScreen('start')} />;
      }

      if (screen === 'stats') {
        return <StatsScreen entries={data.entries} apiKey={data.settings.apiKey} onBack={() => setScreen('start')} />;
      }

      return (
        <StartScreen
          data={data}
          streak={data.streak}
          motivation={motivation}
          todayDone={todayDone}
          todayDraft={todayDraft}
          onStart={() => setScreen('questionnaire')}
          onNavigate={setScreen}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
