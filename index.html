<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>SheepCare</title>
  <meta name="theme-color" content="#16a34a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SheepCare">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>

  <!-- Recharts (Phase 3: Auswertung) -->
  <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
  </script>

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body { margin: 0; background: #f0fdf4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    @keyframes bounceIn {
      0%   { transform: scale(0.3) translateY(-40px); opacity: 0; }
      60%  { transform: scale(1.15) translateY(0);    opacity: 1; }
      100% { transform: scale(1)    translateY(0);    opacity: 1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-5deg); }
      50%       { transform: rotate(5deg); }
    }
    @keyframes slideUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes runOff {
      0%   { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(120vw); opacity: 0; }
    }

    .anim-bounceIn  { animation: bounceIn 0.6s cubic-bezier(.36,.07,.19,.97); }
    .anim-float     { animation: float 3s ease-in-out infinite; }
    .anim-wiggle    { animation: wiggle 0.8s ease-in-out infinite; }
    .anim-slideUp   { animation: slideUp 0.35s ease-out; }
    .anim-fadeIn    { animation: fadeIn 0.4s ease; }
    .anim-runOff    { animation: runOff 1.2s ease-in forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;
    const idbGet = idbKeyval.get;
    const idbSet = idbKeyval.set;

    // ── Schema & Constants ──────────────────────────────────────────────────
    const APP_SCHEMA_VERSION = 1;
    const DB_KEY = 'sheepcare-v1';

    const SCALE_OPTIONS = [
      { value: 100, label: 'Ja, die ganze Zeit',         emoji: '🌟' },
      { value: 75,  label: 'Ja, größten Teils',          emoji: '😊' },
      { value: 50,  label: 'Naja, nur so halb-halb',     emoji: '😐' },
      { value: 25,  label: 'Nein, größten Teils nicht',  emoji: '😕' },
      { value: 0,   label: 'Nein, so gar nicht/kaum',    emoji: '😔' },
    ];

    // Fragenkatalog – reihenfolgetreu, Konditionalfragen mit condition()
    const QUESTIONS = [
      {
        id: 'q_lieb_zu_mir',
        type: 'scale',
        text: 'War ich heute lieb zu mir?',
      },
      {
        id: 'q_spiegel',
        type: 'bool',
        text: 'Habe ich mich heute im Spiegel angelächelt?',
      },
      {
        id: 'q_geduldig_mit_mir',
        type: 'scale',
        text: 'War ich heute geduldig mit mir?',
      },
      {
        id: 'q_geduldig_mit_anderen',
        type: 'scale',
        text: 'War ich geduldig mit anderen?',
      },
      {
        id: 'q_stress',
        type: 'scale',
        text: 'Habe ich mich heute nicht gestresst und meinen Zeitplan realistisch einschätzen können?',
      },
      {
        id: 'q_mahlzeiten',
        type: 'scale',
        text: 'Habe ich auf ausgewogene & kleine Mahlzeiten geachtet?',
      },
      {
        id: 'q_welche_mahlzeit',
        type: 'text',
        text: 'Bei welche(n) Mahlzeit(en) nicht?',
        isFollowUp: true,
        condition: (ans) => (ans.q_mahlzeiten?.value ?? 100) <= 50,
      },
      {
        id: 'q_zeit_fuer_mich',
        type: 'bool',
        text: 'Habe ich mir heute Zeit für mich genommen?',
      },
      {
        id: 'q_wie_viel',
        type: 'duration',
        text: 'Wie viel Zeit habe ich mir genommen?',
        isFollowUp: true,
        condition: (ans) => ans.q_zeit_fuer_mich?.value === true,
      },
      {
        id: 'q_fuer_was',
        type: 'text',
        text: 'Für was habe ich mir die Zeit genommen?',
        isFollowUp: true,
        condition: (ans) => ans.q_zeit_fuer_mich?.value === true,
      },
      {
        id: 'q_warum_nicht',
        type: 'text',
        text: '⚠️ Warum nicht? Nenne deine Ausreden (Gründe)!',
        isFollowUp: true,
        condition: (ans) => ans.q_zeit_fuer_mich?.value === false,
      },
      {
        id: 'q_freude',
        type: 'text',
        text: 'Was hat mir heute wirklich Freude gemacht? Bzw. wann konnte ich wirklich lachen?',
      },
      {
        id: 'q_stolz',
        type: 'text',
        text: 'Worauf bin ich heute stolz?',
      },
      // Sonntag-Fragen
      {
        id: 'q_sonntag_entscheidung',
        type: 'text',
        text: 'Was habe ich diese Woche (für die Familie) ohne Hilfe und ohne Einforderung von Meinung entschieden?',
        sundayOnly: true,
      },
      {
        id: 'q_waage',
        type: 'bool',
        text: 'Habe ich mich mindestens 3× diese Woche auf die Waage gestellt?',
        sundayOnly: true,
      },
      {
        id: 'q_trennung',
        type: 'bool',
        text: 'Konnte ich mich diese Woche von etwas trennen?',
        sundayOnly: true,
      },
      {
        id: 'q_trennung_was',
        type: 'text',
        text: 'Von was?',
        isFollowUp: true,
        sundayOnly: true,
        condition: (ans) => ans.q_trennung?.value === true,
      },
    ];

    // ── Date Helpers ────────────────────────────────────────────────────────
    const dateKey = (d = new Date()) => {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    };

    const parseKey = (key) => new Date(key + 'T12:00:00');

    const daysBetween = (keyA, keyB) => {
      const msPerDay = 1000 * 60 * 60 * 24;
      return Math.round(Math.abs(parseKey(keyB) - parseKey(keyA)) / msPerDay);
    };

    const isSunday = (d = new Date()) => d.getDay() === 0;

    // ── Sound Manager (Web Audio API) ───────────────────────────────────────
    // Lädt sounds/maeh.mp3 + sounds/melody.mp3 falls vorhanden, sonst
    // synthetisierter Fallback. So funktioniert Ton sofort ohne Asset-Dateien.
    const SoundManager = (() => {
      let ctx = null;
      let maehBuffer = null;
      let maehTried = false;
      let enabled = true;

      // Melodie
      let melodyAudio = null;     // <audio>-Element für melody.mp3
      let melodyMp3Failed = false;
      let synthTimer = null;      // Fallback-Jingle-Interval

      const ensureCtx = () => {
        if (!ctx) {
          try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
          catch { ctx = null; }
        }
        if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
        return ctx;
      };

      // Beim ersten User-Gesture aufrufen (entsperrt Autoplay + lädt Sample)
      const unlock = () => { ensureCtx(); loadMaeh(); };

      const loadMaeh = async () => {
        if (maehTried) return;
        const c = ctx;            // nur laden wenn Context bereits durch Gesture existiert
        if (!c) return;
        maehTried = true;
        try {
          const res = await fetch('./sounds/maeh.mp3');
          if (res.ok) {
            const arr = await res.arrayBuffer();
            maehBuffer = await c.decodeAudioData(arr);
          }
        } catch { /* Fallback auf Synthese */ }
      };

      // Synthetisiertes „Mäh" (zittriger Bleat)
      const synthMaeh = (pitch = 1) => {
        const c = ensureCtx(); if (!c) return;
        const now = c.currentTime;
        const osc = c.createOscillator();
        const gain = c.createGain();
        const filter = c.createBiquadFilter();
        osc.type = 'sawtooth';
        const base = 320 * pitch;
        osc.frequency.setValueAtTime(base, now);
        osc.frequency.setValueAtTime(base * 1.12, now + 0.08);
        osc.frequency.setValueAtTime(base * 0.94, now + 0.16);
        osc.frequency.setValueAtTime(base * 1.06, now + 0.24);
        osc.frequency.linearRampToValueAtTime(base * 0.78, now + 0.42);
        filter.type = 'lowpass';
        filter.frequency.value = 1500;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.16, now + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.46);
        osc.connect(filter); filter.connect(gain); gain.connect(c.destination);
        osc.start(now); osc.stop(now + 0.5);
      };

      const playMaeh = (pitch = 1) => {
        if (!enabled) return;
        const c = ensureCtx(); if (!c) return;
        if (maehBuffer) {
          const src = c.createBufferSource();
          const gain = c.createGain();
          src.buffer = maehBuffer;
          src.playbackRate.value = pitch;
          gain.gain.value = 0.7;
          src.connect(gain); gain.connect(c.destination);
          src.start();
        } else {
          synthMaeh(pitch);
        }
      };

      // Fröhlicher synthetisierter Jingle-Loop (Fallback für melody.mp3)
      const startSynthMelody = () => {
        if (synthTimer) return;
        const c = ensureCtx(); if (!c) return;
        const notes = [523.25, 587.33, 659.25, 784.00, 659.25, 587.33, 659.25, 880.00];
        let i = 0;
        const playNote = () => {
          if (!enabled) return;
          const now = c.currentTime;
          const osc = c.createOscillator();
          const gain = c.createGain();
          osc.type = 'triangle';
          osc.frequency.value = notes[i % notes.length];
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.07, now + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
          osc.connect(gain); gain.connect(c.destination);
          osc.start(now); osc.stop(now + 0.34);
          i++;
        };
        playNote();
        synthTimer = setInterval(playNote, 360);
      };

      const stopSynthMelody = () => {
        if (synthTimer) { clearInterval(synthTimer); synthTimer = null; }
      };

      const startMelody = () => {
        if (!enabled) return;
        if (melodyMp3Failed) { startSynthMelody(); return; }
        if (!melodyAudio) {
          melodyAudio = new Audio('./sounds/melody.mp3');
          melodyAudio.loop = true;
          melodyAudio.volume = 0.4;
          melodyAudio.addEventListener('error', () => {
            melodyMp3Failed = true;
            melodyAudio = null;
            if (enabled) startSynthMelody();
          }, { once: true });
        }
        melodyAudio.play().catch(() => {
          melodyMp3Failed = true;
          melodyAudio = null;
          startSynthMelody();
        });
      };

      const stopMelody = () => {
        stopSynthMelody();
        if (melodyAudio) { try { melodyAudio.pause(); melodyAudio.currentTime = 0; } catch {} }
      };

      const setEnabled = (v) => {
        enabled = v;
        if (!v) stopMelody();
      };

      return { unlock, loadMaeh, playMaeh, startMelody, stopMelody, setEnabled };
    })();

    // Hook: zufälliges „Mäh"-Chorus während ein Screen aktiv ist
    const useChorus = (active, dep) => {
      useEffect(() => {
        if (!active) return;
        let timer;
        const schedule = () => {
          const delay = 1500 + Math.random() * 3200;
          timer = setTimeout(() => {
            SoundManager.playMaeh(0.8 + Math.random() * 0.8); // 0.8×–1.6×
            schedule();
          }, delay);
        };
        schedule();
        return () => clearTimeout(timer);
      }, [active, dep]);
    };

    // ── Default Data ────────────────────────────────────────────────────────
    const DEFAULT_DATA = () => ({
      schemaVersion: 1,
      entries: {},
      streak: { current: 0, best: 0, lastCompletedDate: null },
      dailyMotivation: { date: null, text: '' },
      game: { waterDate: null, gameDoneDate: null, shorn: {} },
      settings: {
        soundEnabled: true,
        push20Enabled: true,
        push23Enabled: true,
        push20Time: '20:00',
        push23Time: '23:00',
        pushSubscribed: false,
        apiKey: '',
      },
    });

    // ── Migration Engine ────────────────────────────────────────────────────
    const migrateData = (raw) => {
      if (!raw) return DEFAULT_DATA();

      const data = {
        schemaVersion: raw.schemaVersion || 1,
        entries:  raw.entries  || {},
        streak:   { ...DEFAULT_DATA().streak,   ...(raw.streak   || {}) },
        dailyMotivation: { ...DEFAULT_DATA().dailyMotivation, ...(raw.dailyMotivation || {}) },
        game:     { ...DEFAULT_DATA().game, ...(raw.game || {}), shorn: { ...(raw.game && raw.game.shorn || {}) } },
        settings: { ...DEFAULT_DATA().settings, ...(raw.settings || {}) },
      };

      // Ensure all question keys exist in every entry (null = not in this schema version)
      const allIds = QUESTIONS.map(q => q.id);
      Object.values(data.entries).forEach(entry => {
        if (!entry.answers) entry.answers = {};
        allIds.forEach(id => {
          if (!(id in entry.answers)) entry.answers[id] = null;
        });
      });

      return data;
    };

    // ── DB Layer ────────────────────────────────────────────────────────────
    const loadData = async () => {
      try {
        const raw = await idbGet(DB_KEY);
        return migrateData(raw || null);
      } catch {
        return DEFAULT_DATA();
      }
    };

    const saveData = async (data) => {
      try {
        await idbSet(DB_KEY, data);
      } catch (e) {
        console.error('Speichern fehlgeschlagen', e);
      }
    };

    // ── Claude API (Browser-Direct, kein Backend) ───────────────────────────
    const MODEL_SONNET = 'claude-sonnet-4-6'; // Auswertungs-Analyse
    const MODEL_HAIKU  = 'claude-haiku-4-5';  // Motivationssprüche (Phase 4)

    const callClaude = async (apiKey, model, system, userMessage, maxTokens = 1024) => {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model,
          max_tokens: maxTokens,
          system,
          messages: [{ role: 'user', content: userMessage }],
        }),
      });
      if (!res.ok) {
        const txt = await res.text().catch(() => '');
        throw new Error(`API ${res.status}: ${txt.slice(0, 200)}`);
      }
      const data = await res.json();
      return (data.content || [])
        .filter(c => c.type === 'text')
        .map(c => c.text)
        .join('')
        .trim();
    };

    // ── Motivation (Haiku + lokale Fallbacks) ───────────────────────────────
    const LOCAL_MOTIVATION = [
      'Heute ist ein guter Tag, lieb zu dir selbst zu sein. 🐑',
      'Ein kleiner Schritt für dich, ein großer Sprung für deine Schaf-Herde! 🌿',
      'Du musst nicht perfekt sein – nur freundlich zu dir. 💚',
      'Deine Schafe warten – und sie finden dich großartig. 🐑✨',
      'Selbstfürsorge ist kein Luxus, sondern Schafpflege für die Seele. 🌱',
      'Atme durch. Du machst das wunderbar. 🍃',
      'Jeder Tag, an dem du auf dich achtest, zählt doppelt. 🌟',
    ];
    const LOCAL_NUDGE = [
      'Fast geschafft! Deine Schafe glauben an dich. 🐑',
      'Nur noch ein paar Antworten – dann hüpft ein neues Schaf auf die Wiese! 🌿',
      'Hey, beantworte mich ganz – ich mein’s nur gut mit dir. 💚',
      'Ein bisschen noch! Selbstfürsorge verdient deine volle Aufmerksamkeit. ✨',
      'Deine Herde ist noch nicht vollzählig – mach den Fragebogen fertig! 🐑',
      'Komm, zusammen schaffen wir das – fülle alles aus. 🍀',
    ];
    const pickRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];

    const MOTIVATION_SYSTEM = 'Du bist ein liebevoller, humorvoller Self-Care-Begleiter mit Schaf-Thema. Antworte auf Deutsch, ohne Anführungszeichen, ohne Vorrede.';

    // Tagesspruch: 1×/Tag via Haiku, sonst gecached / lokaler Fallback
    const getDailyMotivation = async (data, apiKey) => {
      const today = dateKey();
      if (data.dailyMotivation && data.dailyMotivation.date === today && data.dailyMotivation.text) {
        return { text: data.dailyMotivation.text, changed: false };
      }
      let text = pickRandom(LOCAL_MOTIVATION);
      if (apiKey) {
        try {
          text = await callClaude(
            apiKey, MODEL_HAIKU, MOTIVATION_SYSTEM,
            'Gib einen kurzen (1–2 Sätze) liebevollen und lustigen Motivationsspruch für den Tag. Thema: Selbstfürsorge und Schafe.',
            150
          );
        } catch { /* lokaler Fallback bleibt */ }
      }
      return { text, changed: true };
    };

    // Ermutigung bei unvollständigem Speichern
    const fetchEncouragement = async (apiKey) => {
      if (!apiKey) return null;
      try {
        return await callClaude(
          apiKey, MODEL_HAIKU, MOTIVATION_SYSTEM,
          'Gib eine freundliche, spielerische Ermutigung (1 Satz), jetzt den Self-Care-Fragebogen vollständig auszufüllen. Keine Floskeln.',
          120
        );
      } catch { return null; }
    };

    // ── Push-Benachrichtigungen (Web Push via Cloudflare Worker) ─────────────
    // Diese drei Werte nach dem Worker-Deploy ausfüllen (siehe worker/README.md):
    const VAPID_PUBLIC_KEY = '';            // öffentlicher VAPID-Key (Base64URL)
    const PUSH_WORKER_URL  = '';            // z.B. 'https://sheepcare-push.<name>.workers.dev'
    const PUSH_TOKEN       = 'CHANGE_ME';   // Shared Secret, identisch im Worker

    const pushConfigured = () => !!(VAPID_PUBLIC_KEY && PUSH_WORKER_URL);

    const urlBase64ToUint8Array = (base64) => {
      const padding = '='.repeat((4 - base64.length % 4) % 4);
      const b64 = (base64 + padding).replace(/-/g, '+').replace(/_/g, '/');
      const raw = atob(b64);
      const arr = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
      return arr;
    };

    // Prefs, die der Worker zum Senden braucht (Zeiten, Flags, Zeitzone, Erledigt-Status)
    const pushPrefs = (settings, streak) => ({
      push20Enabled: settings.push20Enabled,
      push23Enabled: settings.push23Enabled,
      push20Time: settings.push20Time,
      push23Time: settings.push23Time,
      tz: (Intl.DateTimeFormat().resolvedOptions().timeZone) || 'Europe/Berlin',
      lastCompletedDate: streak.lastCompletedDate || null,
    });

    const PushClient = {
      supported: () => 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window,

      async enable(prefs) {
        if (!pushConfigured()) throw new Error('Push ist noch nicht konfiguriert (VAPID-Key & Worker-URL fehlen in index.html).');
        if (!PushClient.supported()) throw new Error('Dieser Browser unterstützt keine Push-Benachrichtigungen.');
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') throw new Error('Benachrichtigungen wurden nicht erlaubt.');
        const reg = await navigator.serviceWorker.ready;
        let sub = await reg.pushManager.getSubscription();
        if (!sub) {
          sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
          });
        }
        const res = await fetch(PUSH_WORKER_URL + '/subscribe', {
          method: 'POST',
          headers: { 'content-type': 'application/json', 'x-sheepcare-token': PUSH_TOKEN },
          body: JSON.stringify({ subscription: sub, prefs }),
        });
        if (!res.ok) throw new Error('Server-Registrierung fehlgeschlagen (' + res.status + ').');
        return true;
      },

      async sync(prefs) {
        if (!pushConfigured()) return false;
        try {
          const reg = await navigator.serviceWorker.ready;
          const sub = await reg.pushManager.getSubscription();
          if (!sub) return false;
          await fetch(PUSH_WORKER_URL + '/sync', {
            method: 'POST',
            headers: { 'content-type': 'application/json', 'x-sheepcare-token': PUSH_TOKEN },
            body: JSON.stringify({ endpoint: sub.endpoint, prefs }),
          });
          return true;
        } catch { return false; }
      },
    };

    // ── Streak Logic ────────────────────────────────────────────────────────
    // Returns: 'start' | 'active' | 'done' | 'broken'
    const streakStatus = (streak) => {
      if (!streak.lastCompletedDate) return 'start';
      const today = dateKey();
      if (streak.lastCompletedDate === today) return 'done';
      const diff = daysBetween(streak.lastCompletedDate, today);
      return diff === 1 ? 'active' : 'broken';
    };

    // ── Active Questions (filtered for current day) ─────────────────────────
    const getActiveSteps = (answers) => {
      const sunday = isSunday();
      return QUESTIONS.filter(q => {
        if (q.sundayOnly && !sunday) return false;
        if (q.condition && !q.condition(answers)) return false;
        return true;
      });
    };

    const allAnswered = (answers) => {
      return getActiveSteps(answers).every(q => {
        const a = answers[q.id];
        if (a === null || a === undefined) return false;
        if (q.type === 'text' && !String(a.value || '').trim()) return false;
        return a.value !== null && a.value !== undefined;
      });
    };

    // ── SVG Graphics ────────────────────────────────────────────────────────
    const SheepSVG = ({ size = 80, className = '', style }) => (
      <svg width={size} height={size} viewBox="0 0 100 100" className={className} style={style}>
        {/* Body wool */}
        <ellipse cx="48" cy="58" rx="30" ry="22" fill="#f1f5f9" stroke="#cbd5e1" strokeWidth="1.5"/>
        {/* Wool bumps */}

    // ── Questionnaire Screen ────────────────────────────────────────────────
    const Questionnaire = ({ existingDraft, apiKey, onFinalSave, onDraftSave, onBack }) => {
      const initAnswers = () => {
        const base = {};
        QUESTIONS.forEach(q => { base[q.id] = null; });
        if (existingDraft?.answers) {
          Object.assign(base, existingDraft.answers);
        }
        return base;
      };

      const [answers,    setAnswers]    = useState(initAnswers);
      const [stepIndex,  setStepIndex]  = useState(0);
      const [toast,      setToast]      = useState(null);
      const [saving,     setSaving]     = useState(false);
      const [nudge,      setNudge]      = useState(null);   // Motivations-Pop-up bei unvollständigem Speichern
      const nudgeBusy = useRef(false);

      const showToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2000);
      };

      // Clamp step index when active steps shrink (e.g. conditional answer changes)
      const activeSteps = getActiveSteps(answers);
      const clampedIndex = Math.min(stepIndex, Math.max(0, activeSteps.length - 1));
      useEffect(() => {
        if (clampedIndex !== stepIndex) setStepIndex(clampedIndex);
      }, [clampedIndex]);

      const currentStep = activeSteps[clampedIndex];
      const totalSteps  = activeSteps.length;
      const isLast      = clampedIndex === totalSteps - 1;
      const complete    = allAnswered(answers);

      const currentValue = currentStep ? (answers[currentStep.id]?.value ?? null) : null;

      const canGoNext = () => {
        if (!currentStep) return false;
        const a = answers[currentStep.id];
        if (!a || a.value === null || a.value === undefined) return false;
        if (currentStep.type === 'text' && !String(a.value).trim()) return false;
        return true;
      };

      const handleChange = (val) => {
        setAnswers(prev => {
          const next = { ...prev, [currentStep.id]: { type: currentStep.type, value: val } };
          // Clear answers for conditional questions that are no longer active
          QUESTIONS.forEach(q => {
            if (q.condition) {
              const wasActive = q.condition(prev);
              const nowActive = q.condition(next);
              if (wasActive && !nowActive) next[q.id] = null;
            }
          });
          return next;
        });
      };

      const handleNext = () => {
        if (!canGoNext()) return;
        if (clampedIndex < getActiveSteps(answers).length - 1) {
          setStepIndex(clampedIndex + 1);
        }
      };

      const handleBack = () => {
        if (clampedIndex > 0) setStepIndex(clampedIndex - 1);
      };

      const handleDraftSave = async () => {
        await onDraftSave(answers);
        showToast('Zwischengespeichert 💾');
      };

      const handleFinalSave = async () => {
        if (!complete) {
          const missing = getActiveSteps(answers).filter(q => {
            const a = answers[q.id];
            if (!a || a.value === null || a.value === undefined) return true;
            return q.type === 'text' && !String(a.value).trim();
          });
          // Sofort lokales Pop-up (jedes Mal anders), parallel ggf. Haiku-Text holen
          setNudge({ text: pickRandom(LOCAL_NUDGE), missing: missing.length });
          if (apiKey && !nudgeBusy.current) {
            nudgeBusy.current = true;
            fetchEncouragement(apiKey)
              .then(t => { if (t) setNudge(n => n ? { ...n, text: t } : n); })
              .finally(() => { nudgeBusy.current = false; });
          }
          return;
        }
        setSaving(true);
        await onFinalSave(answers);
      };

      if (!currentStep) return null;

      return (
        <div className="flex flex-col bg-green-50" style={{ minHeight: '100dvh' }}>
          {toast && <Toast msg={toast} />}

          {/* Motivations-Pop-up bei unvollständigem Speichern */}
          {nudge && (
            <div
              className="fixed inset-0 z-50 flex items-center justify-center px-6 bg-black/40 anim-fadeIn"
              onClick={() => setNudge(null)}
            >
              <div
                className="bg-white rounded-3xl p-6 max-w-sm w-full text-center shadow-xl anim-slideUp"
                onClick={e => e.stopPropagation()}
              >
                <div className="text-5xl mb-3 anim-wiggle inline-block">🐑</div>
                <p className="text-lg font-semibold text-gray-800 mb-2 leading-snug">{nudge.text}</p>
                <p className="text-sm text-gray-400 mb-5">
                  Noch {nudge.missing} Frage{nudge.missing !== 1 ? 'n' : ''} offen.
                </p>
                <Btn variant="primary" onClick={() => setNudge(null)} className="w-full">
                  Weiter ausfüllen 🌿
                </Btn>
              </div>
            </div>

          <div className="bg-white px-4 pt-4 pb-3 shadow-sm flex-none">

              <button onClick={onBack} className="text-sm text-gray-400 py-1 px-2">✕ Abbrechen</button>
              <span className="text-sm text-gray-400 font-medium">{clampedIndex + 1} / {totalSteps}</span>
              <button
                onClick={handleDraftSave}
                className="text-sm text-green-600 font-semibold py-1 px-3 bg-green-50 rounded-full active:bg-green-100"
              >
                Speichern 💾
              </button>
            </div>
            <div className="w-full bg-gray-100 rounded-full h-2.5">
              <div
                className="bg-green-500 h-2.5 rounded-full transition-all duration-400"
                style={{ width: `${((clampedIndex + 1) / totalSteps) * 100}%` }}
              />
            </div>
          </div>

          {/* Question area */}
          <div className="flex-1 overflow-y-auto px-5 py-6">
            {currentStep.isFollowUp && (
              <div className="mb-3 inline-flex items-center gap-1 px-3 py-1 bg-amber-100 text-amber-700 text-xs font-semibold rounded-full">

            {isSunday() && currentStep.sundayOnly && (

            <h2 className="text-xl font-bold text-gray-800 mb-6 leading-snug">
              {currentStep.text}
            </h2>

            {currentStep.type === 'scale'    && <ScaleInput    value={currentValue} onChange={handleChange} />}
            {currentStep.type === 'bool'     && <BoolInput     value={currentValue} onChange={handleChange} />}
            {currentStep.type === 'text'     && <TextInput     value={currentValue} onChange={handleChange} />}
            {currentStep.type === 'duration' && <DurationInput value={currentValue} onChange={handleChange} />}
          </div>

          {/* Bottom bar */}
          <div className="bg-white border-t border-gray-100 px-4 py-4 flex-none" style={{ paddingBottom: 'max(1rem, env(safe-area-inset-bottom))' }}>

                variant={complete ? 'primary' : 'secondary'}

              <Btn

    // ── Reward Screen ───────────────────────────────────────────────────────

    // ── Streak Broken Screen ────────────────────────────────────────────────
    const StreakBrokenScreen = ({ onContinue }) => {
